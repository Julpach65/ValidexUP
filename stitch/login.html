<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Validex UP Secure Login Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#10b981", // Teal-500 ish for buttons/accents
                        secondary: "#0f172a", // Dark slate for deep backgrounds
                        "background-light": "#f1f5f9", // Slate-100 for light mode bg
                        "background-dark": "#0B1120", // Very dark blue/black for dark mode bg
                        "card-dark": "#162032", // Slightly lighter dark for the card
                        "input-dark": "#0f1623", // Dark input background
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    backgroundImage: {
                        'glow-gradient': 'radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.15) 0%, rgba(11, 17, 32, 0) 50%)',
                    }
                },
            },
        };
    </script>
<style>input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #0f1623 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }@keyframes subtle-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
            50% { box-shadow: 0 0 25px rgba(16, 185, 129, 0.5); }
        }
        .btn-glow:hover {
            animation: subtle-pulse 2s infinite;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-200 min-h-screen flex flex-col font-sans transition-colors duration-300 relative overflow-hidden">
<div class="absolute inset-0 z-0 bg-glow-gradient pointer-events-none"></div>
<header class="w-full px-6 py-4 flex justify-between items-center relative z-10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-gradient-to-br from-slate-800 to-black rounded-lg border border-slate-700 flex items-center justify-center shadow-lg">
<span class="material-icons-outlined text-primary text-2xl">verified_user</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">
                Validex <span class="text-primary">UP</span>
</h1>
</div>
<button class="px-5 py-2 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 text-sm font-medium text-slate-700 dark:text-slate-300 transition-colors shadow-sm">
            Soporte
        </button>
</header>
<main class="flex-grow flex items-center justify-center px-4 relative z-10">
<div class="w-full max-w-md bg-white dark:bg-[#1e293b]/60 dark:backdrop-blur-xl border border-slate-200 dark:border-slate-700/50 rounded-2xl shadow-2xl p-8 sm:p-10 transform transition-all">
<div class="flex flex-col items-center text-center mb-8">
<div class="w-14 h-14 rounded-full bg-primary/10 flex items-center justify-center mb-5 ring-1 ring-primary/20">
<span class="material-icons-outlined text-primary text-3xl">face</span>
</div>
<h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Acceso Seguro al Portal</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed max-w-xs mx-auto">
                    Ingresa tus credenciales para acceder al entorno Zero-Trust de Validex UP.
                </p>
</div>
<form action="#" class="space-y-6" method="POST">
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="email">
                        Correo Electrónico
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons-outlined text-slate-400 dark:text-slate-500 group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-slate-50 dark:bg-input-dark border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all sm:text-sm" id="email" name="email" placeholder="usuario@validex.com" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">
                            Contraseña
                        </label>
<a class="text-xs font-medium text-primary hover:text-emerald-400 transition-colors" href="#">
                            ¿Olvidaste tu contraseña?
                        </a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons-outlined text-slate-400 dark:text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-slate-50 dark:bg-input-dark border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all sm:text-sm tracking-widest" id="password" name="password" required="" type="password" value="secretpassword"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
<span class="material-icons-outlined text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">visibility_off</span>
</div>
</div>
</div>
<button class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-full shadow-lg text-sm font-semibold text-white bg-primary hover:bg-emerald-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-primary transition-all duration-200 btn-glow mt-2" type="submit">
                    Iniciar Sesión
                    <span class="material-icons-outlined text-lg">arrow_forward</span>
</button>
</form>
</div>
</main>
<footer class="w-full py-6 text-center relative z-10">
<p class="text-xs text-slate-500 dark:text-slate-600 font-medium">
            © 2026 Validex UP Security Systems. v1.0.0
        </p>
</footer>

</body></html>
